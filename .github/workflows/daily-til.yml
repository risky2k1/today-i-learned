name: Daily TIL

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  til:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      OPEN_ROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Set date
        id: date
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "month=$(date +'%Y-%m')" >> $GITHUB_OUTPUT

      - name: Create daily file with AI content
        env:
          DATE: ${{ steps.date.outputs.date }}
          MONTH: ${{ steps.date.outputs.month }}
        run: |
          mkdir -p daily/$MONTH
          FILE="daily/$MONTH/$DATE.md"

          PROMPT='Bạn là một developer Việt Nam đang ghi lại Today I Learned cho chính mình.

Yêu cầu:
- Chọn ngẫu nhiên MỘT trong các category sau: DevOps, Automation, Travel Tech, Programming.
- Hạn chế lặp lại đúng cùng chủ đề (ví dụ Infrastructure as Code, CI/CD) nếu vài ngày gần đây đã nói; ưu tiên góc nhìn hoặc chủ đề khác.
- Viết 1 mục Today I Learned ngắn gọn (2-4 câu), tiếng Việt tự nhiên, không quá sách vở.
- Format markdown:
  - Dòng đầu: ## [Tên category]
  - Sau đó là 1 đoạn text hoặc 1-3 bullet points.
- Có thể thêm 1 câu kết kiểu nhận xét cá nhân hoặc plan áp dụng (ví dụ: \"mai thử áp dụng vào project\", \"cần đọc thêm docs\"...).'

          if [ -n "$OPEN_ROUTER_API_KEY" ]; then
            BODY=$(jq -n --arg p "$PROMPT" '{model: "arcee-ai/trinity-large-preview:free", messages: [{role: "user", content: $p}]}')
            RESPONSE=$(curl -s -X POST "https://openrouter.ai/api/v1/chat/completions" \
              -H "Authorization: Bearer $OPEN_ROUTER_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$BODY")

            CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

            if [ -n "$CONTENT" ]; then
              if [ -f "$FILE" ]; then
                echo -e "\n\n$CONTENT" >> "$FILE"
                echo "Appended to existing file"
              else
                echo -e "# $DATE\n\n$CONTENT" > "$FILE"
                echo "AI content generated"
              fi
            else
              if [ ! -f "$FILE" ]; then
                echo "API failed, using fallback"
                echo -e "# $DATE\n\n## DevOps\n- Hôm nay chưa có thông tin." > "$FILE"
              fi
            fi
          else
            if [ ! -f "$FILE" ]; then
              echo "No API key, using fallback"
              echo -e "# $DATE\n\n## DevOps\n- Hôm nay chưa có thông tin." > "$FILE"
            fi
          fi

      - name: Commit and push
        env:
          DATE: ${{ steps.date.outputs.date }}
          AUTHOR_NAME: ${{ secrets.AUTHOR_NAME }}
          AUTHOR_EMAIL: ${{ secrets.AUTHOR_EMAIL }}
        run: |
          git config --global user.name "${AUTHOR_NAME:-til-bot}"
          git config --global user.email "${AUTHOR_EMAIL:-til-bot@users.noreply.github.com}"
          git add .
          git diff --staged --quiet || git commit -m "TIL $DATE"
          git push
