name: Daily TIL

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 3 * * *"
    - cron: "0 6 * * *"
    - cron: "0 9 * * *"
    - cron: "0 12 * * *"
    - cron: "0 15 * * *"
    - cron: "0 18 * * *"
    - cron: "0 21 * * *"
    - cron: "0 23 * * *"
    - cron: "30 11 * * *"
  workflow_dispatch:

jobs:
  til:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      OPEN_ROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Set date
        id: date
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "month=$(date +'%Y-%m')" >> $GITHUB_OUTPUT

      - name: Generate TIL
        run: bash scripts/generate_til.sh
        env:
          DATE: ${{ steps.date.outputs.date }}
          MONTH: ${{ steps.date.outputs.month }}

      - name: Commit and push
        env:
          DATE: ${{ steps.date.outputs.date }}
          AUTHOR_NAME: ${{ secrets.AUTHOR_NAME }}
          AUTHOR_EMAIL: ${{ secrets.AUTHOR_EMAIL }}
        run: |
          git config --global user.name "${AUTHOR_NAME:-til-bot}"
          git config --global user.email "${AUTHOR_EMAIL:-til-bot@users.noreply.github.com}"

          git add .
          git diff --staged --quiet || git commit -m "TIL $DATE"
          git pull --rebase origin main
          git push