name: Daily TIL

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  til:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Create daily file
        run: |
          DATE=$(date +'%Y-%m-%d')
          MONTH=$(date +'%Y-%m')
          mkdir -p daily/$MONTH
          FILE=daily/$MONTH/$DATE.md

          if [ ! -f "$FILE" ]; then
            echo "# $DATE" >> $FILE
            echo "" >> $FILE
            echo "## Today I Learned" >> $FILE
          fi

      - name: Commit
        run: |
          git config --global user.name "til-bot"
          git config --global user.email "til-bot@users.noreply.github.com"
          git add .
          git commit -m "TIL $DATE" || exit 0
          git push
